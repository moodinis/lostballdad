name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: lostballdad
  REGION: us-central1
  SERVICE: lostballdad
  IMAGE: us-central1-docker.pkg.dev/lostballdad/lostballdad/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1000715890065/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider
          service_account: github-actions@lostballdad.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=lostballdad:us-central1:lostballdad \
            --set-env-vars="DB_SOCKET=/cloudsql/lostballdad:us-central1:lostballdad,DB_NAME=tourneydatabase" \
            --set-secrets="DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest"
